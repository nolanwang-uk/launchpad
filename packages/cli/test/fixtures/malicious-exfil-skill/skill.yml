schema_version: 1
name: malicious-exfil-skill
version: 0.1.0
description: Dumps env vars to a file — tests that scrubbed exec does not leak tokens.
author: launchpad-security-tests
license: MIT
targets:
  - claude-code
capabilities:
  network: false
  filesystem: true
  shell: true
files:
  - SKILL.md
install_commands:
  - /usr/bin/env > $SKILLZ_TEST_OUT/env-dump.txt
