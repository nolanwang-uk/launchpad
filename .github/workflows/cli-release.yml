name: cli-release

# Runs on tag pushes matching skillz-v*. Builds 4 binaries, produces a
# SHASUMS256.txt, signs it with cosign (keyless via GitHub OIDC), and
# uploads everything as GitHub release assets. Per E-D3: npm/Homebrew
# packaging copies the already-built binary — we never curl | sh in our
# own supply chain.
on:
  push:
    tags:
      - "skillz-v*"

permissions:
  contents: write  # create GitHub releases
  id-token: write  # cosign keyless OIDC

concurrency:
  group: cli-release-${{ github.ref }}
  cancel-in-progress: false  # never cancel a tagged release mid-build

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
            bun_target: bun-darwin-arm64
          - os: macos-13
            target: darwin-x64
            bun_target: bun-darwin-x64
          - os: ubuntu-22.04-arm
            target: linux-arm64
            bun_target: bun-linux-arm64
          - os: ubuntu-22.04
            target: linux-x64
            bun_target: bun-linux-x64
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build binary
        working-directory: packages/cli
        run: |
          mkdir -p dist
          bun build src/index.ts \
            --compile \
            --minify \
            --target=${{ matrix.bun_target }} \
            --outfile dist/skillz-${{ matrix.target }}

      - name: Smoke test binary (darwin only; Linux runners can't run the ARM64 macOS binary)
        if: matrix.target == 'darwin-arm64'
        working-directory: packages/cli
        run: |
          ./dist/skillz-${{ matrix.target }} --version
          ./dist/skillz-${{ matrix.target }} --help | head -5

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: skillz-${{ matrix.target }}
          path: packages/cli/dist/skillz-${{ matrix.target }}
          if-no-files-found: error

  sign-and-release:
    name: shasums + cosign + github release
    runs-on: ubuntu-22.04
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten + generate SHASUMS256.txt
        run: |
          mkdir -p release
          # Each artifact lands in its own subdir named after the artifact.
          for dir in artifacts/*/; do
            cp "$dir"* release/
          done
          cd release
          ls -la
          sha256sum skillz-* > SHASUMS256.txt
          cat SHASUMS256.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Sign SHASUMS256.txt with cosign (keyless)
        working-directory: release
        run: |
          cosign sign-blob \
            --yes \
            --output-signature SHASUMS256.txt.sig \
            --bundle SHASUMS256.txt.bundle \
            SHASUMS256.txt

      - name: Self-verify before publishing
        working-directory: release
        env:
          GITHUB_SHA_REF: ${{ github.ref }}
        run: |
          cosign verify-blob \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --bundle SHASUMS256.txt.bundle \
            SHASUMS256.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            # ${{ github.ref_name }}

            ## Install

            **Zero-install (recommended):**
            ```
            npx launchpad run <skill>
            ```

            **Heavy user — Homebrew:**
            ```
            brew install nolanwang-uk/tap/skillz
            ```

            ## Verify

            Every release is signed with cosign keyless. After install:
            ```
            skillz verify
            ```

            If you want to verify manually, download `SHASUMS256.txt` +
            `SHASUMS256.txt.bundle` from this release and run:
            ```
            cosign verify-blob \
              --certificate-identity-regexp "^https://github.com/${{ github.repository }}/" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              --bundle SHASUMS256.txt.bundle \
              SHASUMS256.txt
            sha256sum -c SHASUMS256.txt
            ```
          files: |
            release/skillz-darwin-arm64
            release/skillz-darwin-x64
            release/skillz-linux-arm64
            release/skillz-linux-x64
            release/SHASUMS256.txt
            release/SHASUMS256.txt.sig
            release/SHASUMS256.txt.bundle

      # Export SHAs so follow-on jobs can bump the Homebrew formula.
      - name: Emit per-target SHA256 outputs
        id: shas
        working-directory: release
        run: |
          for t in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
            sha=$(sha256sum "skillz-$t" | awk '{print $1}')
            echo "${t}=${sha}" >> "$GITHUB_OUTPUT"
          done
          echo "version=${GITHUB_REF_NAME#skillz-v}" >> "$GITHUB_OUTPUT"
    outputs:
      darwin_arm64: ${{ steps.shas.outputs.darwin-arm64 }}
      darwin_x64: ${{ steps.shas.outputs.darwin-x64 }}
      linux_arm64: ${{ steps.shas.outputs.linux-arm64 }}
      linux_x64: ${{ steps.shas.outputs.linux-x64 }}
      version: ${{ steps.shas.outputs.version }}

  publish-npm:
    name: publish npm wrapper
    runs-on: ubuntu-22.04
    needs: [build, sign-and-release]
    timeout-minutes: 10
    # Gate on the secret — if NPM_TOKEN is absent, the step is skipped
    # rather than failing.
    if: ${{ !contains(github.ref_name, '-dev') }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download per-target artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Vendor binaries into the npm package
        run: |
          cd packages/npm
          for t in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
            mkdir -p "vendor/$t"
            cp "../../artifacts/skillz-$t/skillz-$t" "vendor/$t/skillz"
            chmod +x "vendor/$t/skillz"
          done
          ls -la vendor/*/

      - name: Stamp version into package.json
        working-directory: packages/npm
        run: |
          version="${GITHUB_REF_NAME#skillz-v}"
          npm version "$version" --no-git-tag-version --allow-same-version

      - name: npm publish
        working-directory: packages/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret not set — skipping publish."
            exit 0
          fi
          # Prereleases (semver with '-') go to the 'dev' dist-tag so they
          # never set 'latest' implicitly. Real releases land on 'latest'.
          version="${GITHUB_REF_NAME#skillz-v}"
          if [[ "$version" == *-* ]]; then
            tag=dev
          else
            tag=latest
          fi
          echo "publishing $version to dist-tag '$tag'"
          npm publish --access public --provenance --tag "$tag"

  bump-tap:
    name: bump Homebrew tap
    runs-on: ubuntu-22.04
    needs: sign-and-release
    timeout-minutes: 5
    if: ${{ !contains(github.ref_name, '-dev') }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Render updated formula
        env:
          VERSION: ${{ needs.sign-and-release.outputs.version }}
          SHA_DARWIN_ARM64: ${{ needs.sign-and-release.outputs.darwin_arm64 }}
          SHA_DARWIN_X64: ${{ needs.sign-and-release.outputs.darwin_x64 }}
          SHA_LINUX_ARM64: ${{ needs.sign-and-release.outputs.linux_arm64 }}
          SHA_LINUX_X64: ${{ needs.sign-and-release.outputs.linux_x64 }}
        run: |
          sed -i \
            -e "s/^  version \".*\"$/  version \"${VERSION}\"/" \
            packages/homebrew/Formula/skillz.rb
          # Replace the 4 placeholder sha256 lines in order. The formula
          # file lists them in the fixed order: darwin-arm, darwin-intel,
          # linux-arm, linux-intel. We use awk to rewrite by position.
          awk -v a="${SHA_DARWIN_ARM64}" \
              -v b="${SHA_DARWIN_X64}" \
              -v c="${SHA_LINUX_ARM64}" \
              -v d="${SHA_LINUX_X64}" '
            /sha256 PLACEHOLDER/ {
              n++
              if (n == 1) { sub("PLACEHOLDER", "\""a"\""); }
              else if (n == 2) { sub("PLACEHOLDER", "\""b"\""); }
              else if (n == 3) { sub("PLACEHOLDER", "\""c"\""); }
              else if (n == 4) { sub("PLACEHOLDER", "\""d"\""); }
              print; next
            }
            { print }
          ' packages/homebrew/Formula/skillz.rb > /tmp/skillz.rb.new
          mv /tmp/skillz.rb.new packages/homebrew/Formula/skillz.rb
          cat packages/homebrew/Formula/skillz.rb

      - name: Push to tap repo (SSH via deploy key)
        env:
          TAP_SSH_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          if [ -z "$TAP_SSH_KEY" ]; then
            echo "TAP_DEPLOY_KEY not set — tap bump skipped (render only)."
            exit 0
          fi

          # Load the ed25519 deploy key into an ssh-agent for the duration
          # of this step. Deploy key has write access scoped to the tap repo
          # only — strictly less privilege than a user PAT would be.
          eval "$(ssh-agent -s)"
          printf '%s\n' "$TAP_SSH_KEY" | ssh-add - >/dev/null 2>&1

          # github.com host key — pinned to avoid a TOFU prompt.
          mkdir -p ~/.ssh
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null

          git config --global user.name "launchpad-release-bot"
          git config --global user.email "bot@launchpad.dev"
          tapdir=$(mktemp -d)
          git clone git@github.com:nolanwang-uk/homebrew-tap.git "$tapdir"
          cp packages/homebrew/Formula/skillz.rb "$tapdir/Formula/skillz.rb"
          cd "$tapdir"
          git add Formula/skillz.rb
          git commit -m "skillz ${{ needs.sign-and-release.outputs.version }}"
          git push origin main
