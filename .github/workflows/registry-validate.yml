name: registry-validate

# Runs only when a PR touches the registry package. Enforces the schema
# + fuzz-suite gates before a skill can land. This is the backstop behind
# the "Reviewed tier" badge — per PLAN.md F3, Reviewed-tier skills must
# also pass closed-grammar install_commands. The deep per-entry check
# (fetch skill.yml at SHA, re-run the analyzer) is v1.1; for v1 we gate
# on shape + uniqueness + SHA-40 + tier enum + duplicate detection.
on:
  pull_request:
    paths:
      - "packages/registry/**"
  push:
    branches: [main]
    paths:
      - "packages/registry/**"

concurrency:
  group: registry-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate registry.json
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate registry.json schema + cross-entry invariants
        run: bun src/validate-cli.ts --path registry.json --json
        working-directory: packages/registry

      - name: Run analyzer fuzz suite
        # If the analyzer's malicious-corpus tests ever fail, the Reviewed
        # tier's security story is broken. Block every registry PR until
        # the analyzer is hardened back up.
        run: bun test test/analyzer.spec.ts
        working-directory: packages/registry

      - name: Entry-level validation tests
        run: bun test test/entry.spec.ts
        working-directory: packages/registry

      - name: Validate-CLI integration tests
        run: bun test test/validate-cli.spec.ts
        working-directory: packages/registry
